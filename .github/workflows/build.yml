name: Build & Deploy

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jayins-web
          path: target/release/jayins-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jayins-web

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ec2-18-217-111-0.us-east-2.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 停止旧服务
            sudo systemctl stop jayins-web || true

            # 备份旧版本
            if [ -f /home/jayins-web/jayins-web ]; then
              cp /home/jayins-web/jayins-web /home/jayins-web/jayins-web.bak
            fi

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ec2-18-217-111-0.us-east-2.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "jayins-web"
          target: "/home/jayins-web/"

      - name: Setup and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ec2-18-217-111-0.us-east-2.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 设置权限
            chmod +x /home/jayins-web/jayins-web

            # 安装 systemd 服务
            sudo cp /home/jayins-web/jayins-web.service /etc/systemd/system/ 2>/dev/null || true
            sudo systemctl daemon-reload

            # 启动服务
            sudo systemctl enable jayins-web
            sudo systemctl start jayins-web

            # 检查状态
            sleep 2
            sudo systemctl status jayins-web --no-pager
